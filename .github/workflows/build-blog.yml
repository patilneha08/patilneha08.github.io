name: Build Blog from TXT Files

on:
  push:
    branches:
      - main
    paths:
      - "blog/**.txt"        # only run when a .txt file in blog/ changes
  pull_request:
    branches:
      - main
    paths:
      - "blog/**.txt"

# Allow the workflow to commit back to the repo
permissions:
  contents: write

jobs:
  build-blog:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the full repo (so the script can read/write all files)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0           # full history so git log works

      # 2. Set up Python (the generator script is pure-stdlib, no pip needed)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Run the blog generator
      - name: Generate blog pages
        run: python scripts/generate_blog.py

      # 4. Commit any changed/new files back to main
      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add posts/ blog.html index.html

          # Only commit if something actually changed
          if git diff --cached --quiet; then
            echo "Nothing to commit — all files are already up to date."
          else
            git commit -m "🤖 Auto-generate blog pages from TXT files [skip ci]"
            git push
          fi
